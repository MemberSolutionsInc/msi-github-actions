name: Semgrep SAST
description: Run Semgrep static analysis, generate a JSON report, and upload to the central S3 reports bucket

inputs:
  config:
    description: Semgrep ruleset (e.g. p/csharp, p/python, p/javascript, p/typescript)
    required: true
  severity:
    description: Minimum severity level to include in the report (INFO, WARNING, ERROR)
    required: false
    default: WARNING
  paths:
    description: Paths to scan (space-separated)
    required: false
    default: .
  service-name:
    description: Service/repository name — used as the S3 key prefix
    required: true
  s3-reports-bucket:
    description: S3 bucket to upload the report to
    required: false
    default: msi-security-scan-reports
  aws-region:
    description: AWS region of the S3 bucket
    required: false
    default: us-east-1

outputs:
  report-path:
    description: Path to the generated Semgrep JSON report
    value: semgrep-report.json

runs:
  using: composite
  steps:
    - name: Install Semgrep
      shell: bash
      run: pip install semgrep --quiet

    - name: Run Semgrep scan
      shell: bash
      run: |
        semgrep scan \
          --config "${{ inputs.config }}" \
          --severity "${{ inputs.severity }}" \
          --json \
          --output semgrep-report.json \
          ${{ inputs.paths }} || SEMGREP_EXIT=$?
        echo "Semgrep exit: ${SEMGREP_EXIT:-0}"
        # exit 1 means findings found — non-blocking in report mode
        [ "${SEMGREP_EXIT:-0}" -le 1 ] && exit 0 || exit ${SEMGREP_EXIT}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: semgrep-report-${{ github.run_id }}
        path: semgrep-report.json

    - name: Upload to S3
      if: inputs.s3-reports-bucket != ''
      uses: membersolutionsinc/msi-github-actions/.github/actions/upload-scan-report@main
      with:
        report-path: semgrep-report.json
        report-type: semgrep
        service-name: ${{ inputs.service-name }}
        bucket: ${{ inputs.s3-reports-bucket }}
        aws-region: ${{ inputs.aws-region }}
