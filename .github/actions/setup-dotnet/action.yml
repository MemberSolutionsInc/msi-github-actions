name: Setup .NET
description: Install .NET SDK at the specified version with NuGet package caching

inputs:
  dotnet-version:
    description: .NET SDK version to install
    required: false
    default: '8.x'
  cache-key-prefix:
    description: Prefix for the NuGet cache key
    required: false
    default: nuget

runs:
  using: composite
  steps:
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet-version }}
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
        restore-keys: |
          ${{ inputs.cache-key-prefix }}-${{ runner.os }}-
